name: Route Sync Check

on:
  push:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'desktop-app/routes/**'
      - 'local-server/routes/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'desktop-app/routes/**'
      - 'local-server/routes/**'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Route Sync Checker
        id: sync
        run: |
          echo "## Route Sync Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 scripts/sync_check.py 2>&1 | tee /tmp/sync_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          cat /tmp/sync_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $EXIT_CODE -ne 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Warning:** Some Python endpoints are missing in JS backends. Run \`python3 scripts/sync_check.py --fix\` for boilerplate." >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT_CODE
        continue-on-error: true

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/sync_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Route Sync Check Failed\n\nSome Python endpoints are missing in JS backends:\n\n\`\`\`\n${output}\n\`\`\`\n\nRun \`python3 scripts/sync_check.py --fix\` for JS boilerplate.`
            });

      - name: Fail if out of sync
        if: steps.sync.outcome == 'failure'
        run: |
          echo "::warning::Route sync check found missing endpoints. See job summary for details."
          exit 1
