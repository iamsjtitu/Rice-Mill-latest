name: Build & Release Desktop App

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies & fix ajv
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm install ajv@8.17.1 ajv-keywords@5.1.0 --save-dev --legacy-peer-deps
          if (Test-Path "node_modules\ajv-keywords\node_modules\ajv") { Remove-Item -Recurse -Force "node_modules\ajv-keywords\node_modules\ajv" }
        shell: powershell

      - name: Build frontend for desktop
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:9876
          CI: false
          DISABLE_ESLINT_PLUGIN: true
        run: npm run build

      - name: Copy frontend build to desktop-app
        shell: powershell
        run: |
          if (Test-Path "desktop-app/frontend-build") { Remove-Item -Recurse -Force "desktop-app/frontend-build" }
          Copy-Item -Recurse "frontend/build" "desktop-app/frontend-build"
          $html = Get-Content "desktop-app/frontend-build/index.html" -Raw
          $html = $html -replace 'Emergent \| Fullstack App', 'Mill Entry System'
          $html = $html -replace 'A product of emergent.sh', 'Mill Entry System'
          $html = $html -replace '<script src="https://assets\.emergent\.sh/[^"]*"></script>', ''
          $html = $html -replace '<a id="emergent-badge"[^>]*>.*?</a>', ''
          Set-Content "desktop-app/frontend-build/index.html" $html

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Windows App & Publish to Release
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
      
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/latest.yml
          retention-days: 30
