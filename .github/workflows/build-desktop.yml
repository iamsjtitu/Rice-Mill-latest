name: Build & Release Desktop App

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify frontend-build exists
        run: |
          if (!(Test-Path "desktop-app/frontend-build/index.html")) {
            Write-Error "frontend-build not found! Please rebuild frontend before creating release."
            exit 1
          }
          Write-Host "frontend-build found OK"
        shell: powershell

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Windows App & Publish to Release
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
      
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/latest.yml
          retention-days: 30
