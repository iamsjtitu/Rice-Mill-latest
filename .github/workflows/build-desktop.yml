name: Build & Release Desktop App

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm install ajv@8 --legacy-peer-deps

      - name: Build frontend for desktop
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:9876
          CI: false
        run: npx craco build

      - name: Copy frontend build to desktop-app
        run: |
          if (Test-Path "desktop-app/frontend-build") { Remove-Item -Recurse -Force "desktop-app/frontend-build" }
          Copy-Item -Recurse "frontend/build" "desktop-app/frontend-build"
        shell: powershell

      - name: Fix index.html for desktop
        run: |
          $indexPath = "desktop-app/frontend-build/index.html"
          $html = Get-Content $indexPath -Raw
          $html = $html -replace 'Emergent \| Fullstack App', 'Mill Entry System'
          $html = $html -replace 'A product of emergent\.sh', 'Mill Entry System'
          $html = $html -replace '<script src="https://assets\.emergent\.sh/[^"]*"></script>', ''
          $html = $html -replace '<a id="emergent-badge"[^>]*>.*?</a>', ''
          Set-Content $indexPath $html
          Write-Host "index.html fixed for desktop"
        shell: powershell

      - name: Verify frontend-build exists
        run: |
          if (!(Test-Path "desktop-app/frontend-build/index.html")) {
            Write-Error "frontend-build not found after build! Something went wrong."
            exit 1
          }
          Write-Host "frontend-build verified OK"
        shell: powershell

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Windows App & Publish to Release
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
      
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/latest.yml
          retention-days: 30
